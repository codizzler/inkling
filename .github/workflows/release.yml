name: Release

# Pushing a version tag (for example v0.1.0) publishes to crates.io using Trusted
# Publishing (OIDC), so there is no long-lived token stored in the repo.
#
# One-time setup, per crate, on crates.io (after that crate's first manual
# publish so the name exists): crate -> Settings -> Trusted Publishing -> add
# this repository, workflow "release.yml", environment "crates-io".

on:
  push:
    tags: ["v*"]

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: crates-io
    permissions:
      id-token: write # mint the short-lived crates.io OIDC token
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: rust-lang/crates-io-auth-action@v1
        id: auth
      - name: Publish inkling-loader
        run: cargo publish -p inkling-loader
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
      - name: Publish inkling-cli
        run: cargo publish -p inkling-cli
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
